services:
  - type: web
    name: iata-fuel-monitor
    runtime: python
    buildCommand: chmod +x build.sh && bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    disk:
      name: workbooks
      mountPath: /data/workbooks
      sizeGB: 1
    envVars:
      - key: CHROME_BIN
        value: /usr/bin/google-chrome
      - key: CHROMEDRIVER_BIN
        value: /usr/local/bin/chromedriver
      - key: WORKBOOK_DIR
        value: /data/workbooks
      - key: PYTHON_VERSION
        value: 3.11.0